name: AI Backlog Listener

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  issues:
    types: [opened, labeled]      # New issue or label added
  issue_comment:
    types: [created]              # Manual trigger via /ai-implement comment

# ─────────────────────────────────────────────────────────────────────────────
# Permissions  (fine-grained: no write to settings/secrets)
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  contents: write          # push feature branch
  pull-requests: write     # create draft PR
  issues: write            # add tracking comments

# ─────────────────────────────────────────────────────────────────────────────
jobs:
# ─────────────────────────────────────────────────────────────────────────────
  validate-trigger:
    name: Validate trigger conditions
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      issue_number: ${{ steps.check.outputs.issue_number }}
      branch_slug: ${{ steps.check.outputs.branch_slug }}

    steps:
      # ── Use env: to avoid shell-injection from untrusted issue content ──
      - name: Check trigger conditions
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          LABELS_JSON: ${{ toJson(github.event.issue.labels.*.name) }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          SHOULD_RUN="false"

          # Case 1: issue opened/labeled with 'ai-task'
          if [[ "$EVENT_NAME" == "issues" ]]; then
            if echo "$LABELS_JSON" | grep -q '"ai-task"'; then
              SHOULD_RUN="true"
            fi
          fi

          # Case 2: maintainer posts /ai-implement comment
          if [[ "$EVENT_NAME" == "issue_comment" ]]; then
            if echo "$COMMENT_BODY" | grep -qF '/ai-implement'; then
              SHOULD_RUN="true"
            fi
          fi

          # Sanitise title → URL-safe slug for branch name
          SLUG=$(echo "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | tr ' ' '-' \
            | tr -cd '[:alnum:]-' \
            | sed 's/^-*//' \
            | cut -c1-50)

          echo "should_run=${SHOULD_RUN}"   >> "$GITHUB_OUTPUT"
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "branch_slug=${SLUG}"         >> "$GITHUB_OUTPUT"

          echo "Event      : $EVENT_NAME"
          echo "Labels     : $LABELS_JSON"
          echo "Should run : $SHOULD_RUN"
          echo "Slug       : $SLUG"

  # ───────────────────────────────────────────────────────────────────────────
  setup-branch:
    name: Create feature branch
    needs: validate-trigger
    if: needs.validate-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.branch.outputs.name }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch and push initial commit
        id: branch
        env:
          NUM: ${{ needs.validate-trigger.outputs.issue_number }}
          SLUG: ${{ needs.validate-trigger.outputs.branch_slug }}
        run: |
          BRANCH="ai/issue-${NUM}-${SLUG}"
          echo "name=${BRANCH}" >> "$GITHUB_OUTPUT"

          git checkout -b "$BRANCH"

          # GitHub requires at least one commit ahead of base to open a PR
          git commit --allow-empty \
            -m "chore(#${NUM}): initialize AI feature branch"

          git push origin "$BRANCH"
          echo "✅ Branch '$BRANCH' created."

  # ───────────────────────────────────────────────────────────────────────────
  create-draft-pr:
    name: Create draft PR
    needs: [validate-trigger, setup-branch]
    if: needs.validate-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      pr_url: ${{ steps.pr.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Open draft pull request
        id: pr
        env:
          BRANCH: ${{ needs.setup-branch.outputs.branch_name }}
          NUM: ${{ needs.validate-trigger.outputs.issue_number }}
          SLUG: ${{ needs.validate-trigger.outputs.branch_slug }}
          REPO: ${{ github.repository }}
        run: |
          PR_BODY="## 🤖 Automated Implementation

          This PR was generated by the **AI Software Factory** pipeline.

          ### Linked issue
          Closes #${NUM}

          ### Agents involved
          | Role | Agent file |
          |------|-----------|
          | Developer | [\`.github/agents/senior-dev.agent.md\`](.github/agents/senior-dev.agent.md) |
          | Reviewer checklist | [\`.github/agents/reviewer.agent.md\`](.github/agents/reviewer.agent.md) |

          ### Architecture reference
          - [\`docs/architecture-rules.md\`](docs/architecture-rules.md)

          ### Review checklist
          - [ ] Code follows architecture rules
          - [ ] Unit tests written and passing
          - [ ] No hardcoded secrets or credentials
          - [ ] Naming conventions respected
          - [ ] No TODO comments remain
          - [ ] PR is ready for human review

          > **Draft PR** — do not merge until all checklist items are ticked."

          PR_URL=$(gh pr create \
            --repo "$REPO" \
            --title "[AI] Issue #${NUM}" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH" \
            --draft \
            --label "ai-generated")

          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "✅ Draft PR → $PR_URL"

  # ───────────────────────────────────────────────────────────────────────────
  trigger-copilot-agent:
    name: Trigger Copilot coding agent
    needs: [validate-trigger, setup-branch, create-draft-pr]
    if: needs.validate-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Post agent instruction comment
        env:
          BRANCH: ${{ needs.setup-branch.outputs.branch_name }}
          PR_URL: ${{ needs.create-draft-pr.outputs.pr_url }}
          NUM: ${{ needs.validate-trigger.outputs.issue_number }}
          REPO: ${{ github.repository }}
        run: |
          # Variables expand correctly because we use env: (no heredoc quoting issue)
          BODY="@github-copilot Please implement this issue following the rules below.

          **Branch to work on:** \`${BRANCH}\`
          **Draft PR (push your commits there):** ${PR_URL}

          **Step 1 — Read context files first:**
          - \`docs/architecture-rules.md\` — architecture constraints
          - \`.github/agents/senior-dev.agent.md\` — coding standards

          **Step 2 — Implement everything in the issue acceptance criteria.**
          - All new logic must be covered by unit tests (≥ 80 % branch coverage).
          - No TODO comments — complete implementation only.
          - Run \`dotnet build\` (zero warnings) and \`dotnet test\` (all pass) before finishing.

          **Step 3 — Push commits to \`${BRANCH}\`.**
          The draft PR is already open. A reviewer agent will inspect your work."

          gh issue comment "$NUM" \
            --repo "$REPO" \
            --body "$BODY"

  # ───────────────────────────────────────────────────────────────────────────
  notify-issue:
    name: Post tracking comment on issue
    needs: [validate-trigger, setup-branch, create-draft-pr]
    if: needs.validate-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Post status comment
        env:
          NUM: ${{ needs.validate-trigger.outputs.issue_number }}
          BRANCH: ${{ needs.setup-branch.outputs.branch_name }}
          PR_URL: ${{ needs.create-draft-pr.outputs.pr_url }}
          REPO: ${{ github.repository }}
        run: |
          BODY="## 🏭 AI Software Factory — Pipeline started

          | Item | Value |
          |------|-------|
          | 🌿 Branch | \`${BRANCH}\` |
          | 📋 Draft PR | ${PR_URL} |
          | 🤖 Agent | @github-copilot (senior-dev rules) |
          | 📐 Architecture | \`docs/architecture-rules.md\` |

          The Copilot coding agent has received the implementation instructions.
          When commits are pushed, open the draft PR and invoke the reviewer agent."

          gh issue comment "$NUM" \
            --repo "$REPO" \
            --body "$BODY"
